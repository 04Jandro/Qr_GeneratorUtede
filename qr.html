<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Utedé</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2456;
      --blue: #1e6bb8;
      --light-blue: #4a9fd4;
      --white: #ffffff;
      --off-white: #f4f7fc;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: linear-gradient(135deg, #0d1535 0%, #1a2456 40%, #1e4a8a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30,107,184,0.15) 0%, transparent 70%);
      top: -150px; right: -150px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(74,159,212,0.1) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      pointer-events: none;
    }

    .bg-stripes {
      position: fixed; inset: 0;
      background-image: repeating-linear-gradient(45deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 62px);
      pointer-events: none;
    }

    .app-wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 500px;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .app-header { text-align: center; margin-bottom: 28px; }

    .brand-logo {
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 10px 22px 10px 16px;
      border-radius: 50px; margin-bottom: 12px;
      backdrop-filter: blur(8px);
    }

    .brand-logo img { height: 30px; }

    .app-subtitle {
      font-size: 11px; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(255,255,255,0.38);
    }

    .card {
      background: var(--white); border-radius: 24px;
      padding: 36px 32px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
    }

    .card-title {
      font-family: 'Montserrat', sans-serif; font-size: 12px;
      font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--navy); margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .card-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, #dde4f0, transparent); }

    .input-wrap { position: relative; margin-bottom: 14px; }

    .input-wrap input {
      width: 100%; border: 1.5px solid #dde4f0; border-radius: 12px;
      padding: 13px 16px 13px 44px;
      font-family: 'Raleway', sans-serif; font-size: 14px;
      color: var(--navy); outline: none; background: var(--off-white);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .input-wrap input:focus {
      border-color: var(--blue); background: white;
      box-shadow: 0 0 0 4px rgba(30,107,184,0.1);
    }
    .input-wrap input::placeholder { color: #a0aec0; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }

    .options-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }

    .opt-group label {
      display: block; font-size: 10px; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: #6b7fa3; margin-bottom: 6px;
    }

    .opt-group select, .opt-group input[type="color"] {
      width: 100%; height: 40px; border: 1.5px solid #dde4f0;
      border-radius: 10px; background: var(--off-white);
      font-family: 'Raleway', sans-serif; font-size: 13px;
      color: var(--navy); padding: 0 10px; outline: none; cursor: pointer;
      transition: border-color 0.2s;
    }
    .opt-group input[type="color"] { padding: 3px 6px; }
    .opt-group select:focus, .opt-group input[type="color"]:focus { border-color: var(--blue); }

    .gen-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
      color: white; border: none; border-radius: 12px; padding: 15px;
      font-family: 'Montserrat', sans-serif; font-size: 13px;
      font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(26,36,86,0.3);
    }
    .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(26,36,86,0.4); }
    .gen-btn:active { transform: translateY(0); }

    .divider {
      display: none; align-items: center; gap: 12px; margin: 28px 0;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #dde4f0, transparent); }
    .divider span { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #a0aec0; }

    .qr-result {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }
    .qr-result.visible { opacity: 1; transform: translateY(0); pointer-events: all; }

    .qr-card {
      position: relative; width: 100%;
      background: linear-gradient(145deg, var(--navy) 0%, #1e3a7a 100%);
      border-radius: 20px; padding: 24px;
      box-shadow: 0 20px 60px rgba(26,36,86,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .qr-card::before {
      content: ''; position: absolute; inset: 0; border-radius: 20px;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 18px 18px; pointer-events: none;
    }

    .qr-card-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; position: relative; z-index: 1;
    }
    .qr-card-brand { display: flex; align-items: center; gap: 8px; }
    .qr-card-brand img { height: 22px; }
    .qr-badge {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px; padding: 4px 10px;
      font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.7); font-family: 'Montserrat', sans-serif; font-weight: 600;
    }

    .qr-frame-outer { position: relative; z-index: 1; display: flex; justify-content: center; }

    .qr-canvas-wrap {
      position: relative; background: white;
      border-radius: 16px; padding: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    .qr-logo-overlay {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: white; border-radius: 8px; padding: 5px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      z-index: 10; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
    }
    .qr-logo-overlay img { display: block; }

    .qr-corner { position: absolute; width: 20px; height: 20px; }
    .qr-corner.tl { top: 4px; left: 4px; border-top: 3px solid var(--light-blue); border-left: 3px solid var(--light-blue); border-radius: 4px 0 0 0; }
    .qr-corner.tr { top: 4px; right: 4px; border-top: 3px solid var(--light-blue); border-right: 3px solid var(--light-blue); border-radius: 0 4px 0 0; }
    .qr-corner.bl { bottom: 4px; left: 4px; border-bottom: 3px solid var(--light-blue); border-left: 3px solid var(--light-blue); border-radius: 0 0 0 4px; }
    .qr-corner.br { bottom: 4px; right: 4px; border-bottom: 3px solid var(--light-blue); border-right: 3px solid var(--light-blue); border-radius: 0 0 4px 0; }

    #qrcode canvas, #qrcode img { display: block; border-radius: 4px; }

    .qr-card-footer { position: relative; z-index: 1; margin-top: 16px; text-align: center; }
    .qr-url-text {
      font-size: 11px; color: rgba(255,255,255,0.4);
      font-family: 'Raleway', sans-serif; letter-spacing: 0.04em;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 320px; margin: 0 auto;
    }

    .action-row { display: flex; gap: 10px; width: 100%; }

    .dl-btn {
      flex: 1; background: linear-gradient(135deg, var(--navy), var(--blue));
      color: white; border: none; border-radius: 12px; padding: 13px;
      font-family: 'Montserrat', sans-serif; font-size: 12px;
      font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(26,36,86,0.25);
    }
    .dl-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(26,36,86,0.35); }
    .dl-btn:active { transform: translateY(0); }
    .dl-btn.secondary {
      background: var(--off-white); color: var(--navy);
      box-shadow: 0 4px 15px rgba(26,36,86,0.1);
    }
    .dl-btn.secondary:hover { box-shadow: 0 8px 22px rgba(26,36,86,0.15); }
  </style>
</head>
<body>
<div class="bg-stripes"></div>

<div class="app-wrapper">
  <div class="app-header">
    <div class="brand-logo">
      <img src="img/logoUtede.png" alt="Utedé"/>
    </div>
    <p class="app-subtitle">Generador de Códigos QR</p>
  </div>

  <div class="card">
    <p class="card-title">Configurar QR</p>

    <div class="input-wrap">
      <span class="input-icon">🔗</span>
      <input type="text" id="texto" placeholder="https://utede.edu.co o cualquier texto…"/>
    </div>

    <div class="options-row">
      <div class="opt-group">
        <label>Tamaño</label>
        <select id="tamano">
          <option value="180">Pequeño</option>
          <option value="240" selected>Mediano</option>
          <option value="300">Grande</option>
        </select>
      </div>
      <div class="opt-group">
        <label>Color QR</label>
        <input type="color" id="colorQR" value="#1a2456"/>
      </div>
    </div>

    <button class="gen-btn" onclick="generarQR()">✦ Generar código QR</button>

    <div class="divider" id="divider"><span>resultado</span></div>

    <div class="qr-result" id="qrResult">
      <div class="qr-card">
        <div class="qr-card-top">
          <div class="qr-card-brand">
            <img src="img/logoUtede.png" alt="Utedé"/>
          </div>
          <div class="qr-badge">QR Code</div>
        </div>

        <div class="qr-frame-outer">
          <div class="qr-canvas-wrap" id="qrCanvasWrap">
            <div class="qr-corner tl"></div>
            <div class="qr-corner tr"></div>
            <div class="qr-corner bl"></div>
            <div class="qr-corner br"></div>
            <div id="qrcode"></div>
            <div class="qr-logo-overlay" id="logoOverlay">
              <img id="logoCenter"
                src="img/logoUtede.png"
                alt="Utedé"/>
            </div>
          </div>
        </div>

        <div class="qr-card-footer">
          <p class="qr-url-text" id="urlPreview">—</p>
        </div>
      </div>

      <div class="action-row">
        <button class="dl-btn secondary" onclick="copiarTexto()">⎘ Copiar texto</button>
        <button class="dl-btn" onclick="descargarQR()">↓ Descargar PNG</button>
      </div>
    </div>
  </div>
</div>

<div style="position: fixed; bottom: 10px; right: 15px; font-size: 11px; color: rgba(255,255,255,0.4); font-family: 'Raleway', sans-serif;">
  Creado por <strong>Jandro Martinez</strong>
</div>

<script>
  const LOGO_URL = "img/logoUtede.png";
  let logoBase64 = null;

  // Carga el logo como base64 - funciona con file:// y servidor
  function preloadLogo() {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        try {
          const c = document.createElement('canvas');
          c.width = img.naturalWidth;
          c.height = img.naturalHeight;
          c.getContext('2d').drawImage(img, 0, 0);
          logoBase64 = c.toDataURL('image/png');
        } catch(e) {
          logoBase64 = null;
        }
        resolve();
      };
      img.onerror = () => resolve();
      img.src = LOGO_URL;
    });
  }

  preloadLogo();
  function generarQR() {
    const texto = document.getElementById("texto").value.trim();
    if (!texto) { document.getElementById("texto").focus(); return; }

    const colorQR = document.getElementById("colorQR").value;
    const tamano  = parseInt(document.getElementById("tamano").value);

    document.getElementById("qrcode").innerHTML = "";

    new QRCode(document.getElementById("qrcode"), {
      text: texto,
      width: tamano,
      height: tamano,
      colorDark: colorQR,
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    // Scale logo overlay
    const logoWidth = Math.round(tamano * 0.40);
    const logoHeight = Math.round(tamano * 0.18);
    const logoImg = document.getElementById("logoCenter");
    logoImg.style.width = logoWidth + "px";
    logoImg.style.height = logoHeight + "px";

    document.getElementById("urlPreview").textContent = texto;

    const div = document.getElementById("divider");
    div.style.display = "flex";

    const result = document.getElementById("qrResult");
    result.classList.remove("visible");
    requestAnimationFrame(() => requestAnimationFrame(() => result.classList.add("visible")));
  }

  function descargarQR() {
    setTimeout(() => {
      const qrCanvas = document.querySelector("#qrcode canvas");
      if (!qrCanvas) return;

      const qrSize = qrCanvas.width;
      const pad = 28;
      const total = qrSize + pad * 2;

      const out = document.createElement("canvas");
      out.width = total; out.height = total;
      const ctx = out.getContext("2d");

      // White bg
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, total, total);

      // QR
      ctx.drawImage(qrCanvas, pad, pad);

      // Logo overlay
      const drawAndSave = () => {
        const link = document.createElement("a");
        link.download = "qr-utede.png";
        link.href = out.toDataURL("image/png");
        link.click();
      };

      // Usa la imagen ya cargada del DOM (funciona en file://)
      const logoImg = document.getElementById("logoCenter");
      if (logoImg && logoImg.complete) {
        const logoWidth = Math.round(qrSize * 0.40);
        const logoHeight = Math.round(qrSize * 0.18);
        const lx = (total - logoWidth) / 2;
        const ly = (total - logoHeight) / 2;
        const lpad = 8;

        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        if (ctx.roundRect) {
          ctx.roundRect(lx - lpad/2, ly - lpad/2, logoWidth + lpad, logoHeight + lpad, 6);
        } else {
          ctx.rect(lx - lpad/2, ly - lpad/2, logoWidth + lpad, logoHeight + lpad);
        }
        ctx.fill();

        ctx.drawImage(logoImg, lx, ly, logoWidth, logoHeight);
      }
      
      drawAndSave();
    }, 200);
  }

  function copiarTexto() {
    const texto = document.getElementById("texto").value.trim();
    if (!texto) return;
    navigator.clipboard.writeText(texto).then(() => {
      const btn = document.querySelector(".dl-btn.secondary");
      const orig = btn.textContent;
      btn.textContent = "✓ Copiado";
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }

  document.getElementById("texto").addEventListener("keydown", e => {
    if (e.key === "Enter") generarQR();
  });
</script>
</body>
</html>
